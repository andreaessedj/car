<!DOCTYPE html>
<html lang="it">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarSex Map</title>

  <!-- Sidebar spostata nel body -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;600&display=swap');
    body { margin: 0; font-family: 'Rubik', sans-serif; background-color: #f0f2f5; color: #333; }
    #map {
      position: absolute;
      top: 0;
      right: 0;
      left: 260px;
      height: 60vh;
      width: calc(100% - 260px);
      z-index: 1;
      border-radius: 0 0 18px 0;
      box-shadow: 0 6px 24px rgba(255,51,102,0.08);
      transition: left 0.3s ease, width 0.3s ease;
    }
    #sidebar.collapsed ~ #map {
      left: 48px;
      width: calc(100% - 48px);
    }
    #filters {
      padding: 12px 24px;
      background: #fff;
      border-bottom: 1.5px solid #ffe3e3;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: 260px;
      box-shadow: 0 2px 12px rgba(255,51,102,0.04);
    }
    #filters input {
      padding: 10px 12px;
      border-radius: 7px;
      border: 1px solid #e0e0e0;
      font-size: 15px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      outline: none;
      transition: border 0.2s;
    }
    #modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); display: none; justify-content: center; align-items: center; z-index: 2000; }
    #modalContent { background: #fff; padding: 24px; border-radius: 10px; width: 300px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    .closeBtn { position: absolute; top: 8px; right: 12px; font-size: 20px; cursor: pointer; color: #888; }
    .closeBtn:hover { color: #000; }
    #modalContent input, #modalContent textarea { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
    #modalContent button { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
    #checkinList {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 260px;
      height: 32vh;
      overflow-y: auto;
      padding: 22px 28px 18px 28px;
      background: linear-gradient(90deg,#fff 80%,#ffe3e3 100%);
      border-top: 1.5px solid #ffe3e3;
      z-index: 2;
      border-radius: 18px 0 0 0;
      box-shadow: 0 -6px 24px rgba(255,51,102,0.08);
      transition: left 0.3s ease, width 0.3s ease;
    }
    #sidebar.collapsed ~ #checkinList {
      left: 48px;
      width: calc(100% - 48px);
    }
    .checkin-item {
      margin-bottom: 14px;
      padding: 14px 18px;
      border-bottom: 1px dashed #ff7a5c;
      cursor: pointer;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(255,51,102,0.04);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .checkin-item:hover {
      background: #ffe3e3;
      box-shadow: 0 4px 16px rgba(255,51,102,0.08);
    }
    .comment-input {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }
    .comment-input input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #ff7a5c;
      font-size: 14px;
      outline: none;
      box-shadow: 0 1px 4px rgba(255,51,102,0.04);
      transition: border 0.2s;
    }
    .comment-input input:focus {
      border: 1.5px solid #ff3366;
    }
    .comment-input button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(90deg,#ff3366 60%,#ff7a5c 100%);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(255,51,102,0.10);
      transition: background 0.3s;
    }
    .comment-input button:hover {
      background: linear-gradient(90deg,#ff7a5c 60%,#ff3366 100%);
    }
    .comment {
      font-size: 14px;
      margin-top: 6px;
      padding-left: 12px;
      color: #444;
      background: #fff6f6;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(255,51,102,0.04);
    }
    .expiration-timer {
      font-size: 13px;
      color: #ff3366;
      margin-top: 8px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 260px;
      background: linear-gradient(120deg,#fff 80%,#ffe3e3 100%);
      box-shadow: 2px 0 18px rgba(255,51,102,0.10);
      z-index: 1100;
      display: flex;
      flex-direction: column;
      border-right: 1.5px solid #ffe3e3;
      transition: width 0.3s ease;
      overflow-y: auto;
    }
    #sidebar.collapsed {
      width: 48px;
    }
    #sidebarToggle {
      background: none;
      border: none;
      font-size: 26px;
      padding: 14px 10px 8px 10px;
      cursor: pointer;
      color: #ff3366;
      align-self: flex-start;
      margin-bottom: 8px;
      transition: color 0.2s;
    }
    #sidebarToggle:hover {
      color: #ff7a5c;
    }
    #sidebarContent {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 24px 18px 12px 18px;
      transition: opacity 0.3s ease;
      max-width: 100%;
      box-sizing: border-box;
    }
    #sidebar.collapsed #sidebarContent {
      opacity: 0;
      pointer-events: none;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>
  <div id="sidebar">
    <button id="sidebarToggle" onclick="toggleSidebar()">☰</button>
    <div id="sidebarContent">
      <h2 style="margin-bottom:18px;color:#ff3366;font-weight:700;letter-spacing:1px;font-size:1.3em;">CarSex Map</h2>
      <button onclick="geoCheckIn()" style="width:100%;padding:14px 0;font-size:17px;font-weight:600;background:linear-gradient(90deg,#ff3366 60%,#ff7a5c 100%);color:#fff;border:none;border-radius:8px;box-shadow:0 2px 8px rgba(255,51,102,0.12);margin-bottom:18px;transition:background 0.3s;">📍 Localizzati</button>
      <input type="text" id="cityFilter" placeholder="Cerca per città..." oninput="renderCheckins()" style="width:100%;padding:10px 12px;margin-bottom:14px;border-radius:7px;border:1px solid #e0e0e0;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,0.04);outline:none;transition:border 0.2s;">
      <div style="width:100%;margin-bottom:14px;">
        <label for="distanceFilter" style="font-size:14px;color:#ff3366;font-weight:600;">Distanza max (km): <span id="distanceValue">50</span></label>
        <input type="range" id="distanceFilter" min="1" max="100" value="50" oninput="document.getElementById('distanceValue').textContent=this.value; renderCheckins();" style="width:100%;">
      </div>
      <p style="margin-top:0;font-size:13px;color:#888;">oppure clicca sulla mappa</p>
    </div>
  </div>

  <div id="map"></div>

  <div id="filters">
  </div>

  <div id="checkinList"></div>

  <div id="modal">
    <div id="modalContent">
      <span class="closeBtn" onclick="hideModal()">✖</span>
      <h3>Nuovo check-in</h3>
      <input type="text" id="nickname" placeholder="Il tuo nome (anonimo)">
      <textarea id="description" placeholder="Scrivi dettagli..." rows="3"></textarea>
      <input type="file" accept="image/*" id="photoInput">
      <button onclick="confirmCheckIn()">Conferma</button>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const supa = createClient('https://seweuyiyvicoqvtgjwss.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNld2V1eWl5dmljb3F2dGdqd3NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQxODkxMDQsImV4cCI6MjA1OTc2NTEwNH0.VmAIM06-p4MZz8fxB3HbTzo1QiA9-JBoabp-Aehu2ko');

    let map = L.map('map').setView([41.9, 12.5], 13);
    let tempLat = null, tempLon = null;
    let markers = [], expirationTimers = [];

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function geoCheckIn() {
      if (!navigator.geolocation) return alert("Geolocalizzazione non supportata.");
      navigator.geolocation.getCurrentPosition(
        pos => {
          const { latitude, longitude } = pos.coords;
          map.setView([latitude, longitude], 15);
          showModal(latitude, longitude);
        },
        () => alert("Errore durante il recupero della posizione."),
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    map.on('click', e => {
      const { lat, lng } = e.latlng;
      showModal(lat, lng);
    });

    function showModal(lat, lon) {
      tempLat = lat;
      tempLon = lon;
      document.getElementById('nickname').value = '';
      document.getElementById('description').value = '';
      document.getElementById('photoInput').value = '';
      document.getElementById('modal').style.display = 'flex';
    }

    function hideModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function confirmCheckIn() {
      const nickname = document.getElementById('nickname').value.trim();
      const description = document.getElementById('description').value.trim();
      const photoInput = document.getElementById('photoInput');
      if (!nickname || !description || tempLat === null || tempLon === null) return alert("Compila tutti i campi.");

      const reader = new FileReader();
      reader.onload = async function () {
        const photoData = reader.result;
        const city = await getCityFromCoords(tempLat, tempLon);
        await supa.from('checkins').insert({ nickname, description, lat: tempLat, lon: tempLon, city, photo: photoData });
        hideModal();
        renderCheckins();
      };
      if (photoInput.files[0]) reader.readAsDataURL(photoInput.files[0]);
      else reader.onload();
    }

    function getCityFromCoords(lat, lon) {
      const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`;
      return fetch(url).then(res => res.json()).then(data => data.address?.city || data.address?.town || data.address?.village || "");
    }

    async function renderCheckins() {
      const list = document.getElementById("checkinList");
      list.innerHTML = "";
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      expirationTimers.forEach(clearInterval);
      expirationTimers = [];

      const { data, error } = await supa.from('checkins').select('*');
      if (error) return alert("Errore nel caricamento dei check-in");

      const now = new Date();
      const cityFilter = document.getElementById('cityFilter').value.toLowerCase();
      const distanceFilter = parseInt(document.getElementById('distanceFilter').value, 10);

      // Ottieni posizione utente (se disponibile)
      let userLat = null, userLon = null;
      if (navigator.geolocation) {
        try {
          const pos = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 3000, maximumAge: 0 });
          });
          userLat = pos.coords.latitude;
          userLon = pos.coords.longitude;
        } catch {}
      }

      function getDistanceKm(lat1, lon1, lat2, lon2) {
        if (lat1 == null || lon1 == null || lat2 == null || lon2 == null) return Infinity;
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
      }

      const filtered = data.filter(c => {
        const created = new Date(c.created_at);
        const diff = (now - created) / 1000 / 3600;
        const matchCity = (c.city || "").toLowerCase().includes(cityFilter);
        let matchDistance = true;
        if (userLat != null && userLon != null) {
          const dist = getDistanceKm(userLat, userLon, c.lat, c.lon);
          matchDistance = dist <= distanceFilter;
        }
        return diff <= 6 && matchCity && matchDistance;
      }).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      for (const c of filtered) {
        const createdAt = new Date(c.created_at);
        const expiresAt = new Date(createdAt.getTime() + 6 * 60 * 60 * 1000);

        const item = document.createElement("div");
        item.className = "checkin-item";
        item.innerHTML = `
          <b>${c.nickname}</b>: ${c.description} (${c.city || ""})<br>
          <div class='expiration-timer' id='timer-${c.id}'>Scade tra...</div>
          <div id="comments-${c.id}"></div>
          <div class='comment-input'>
            <input type='text' id='comment-input-${c.id}' placeholder='Scrivi un commento...'>
            <button onclick='addComment(${c.id})'>Invia</button>
          </div>
        `;
        item.onclick = () => map.setView([c.lat, c.lon], 16);
        list.appendChild(item);

        const marker = L.marker([c.lat, c.lon]).addTo(map);
        marker.bindPopup(`<b>${c.nickname}</b><br>${c.description}<br><a href='https://maps.google.com?q=${c.lat},${c.lon}' target='_blank'>Naviga</a>`);
        markers.push(marker);

        loadComments(c.id);

        const timerElement = document.getElementById(`timer-${c.id}`);
        const interval = setInterval(() => {
          const now = new Date();
          const diff = Math.max(0, Math.floor((expiresAt - now) / 1000));
          if (diff <= 0) {
            timerElement.textContent = "Scaduto";
            clearInterval(interval);
            renderCheckins();
          } else {
            const h = Math.floor(diff / 3600);
            const m = Math.floor((diff % 3600) / 60);
            const s = diff % 60;
            timerElement.textContent = `Scade tra ${h}h ${m}m ${s}s`;
          }
        }, 1000);
        expirationTimers.push(interval);
      }
    }

    async function addComment(checkinId) {
      const input = document.getElementById(`comment-input-${checkinId}`);
      const content = input.value.trim();
      if (!content) return;
      await supa.from('comments').insert({ checkin_id: checkinId, content });
      input.value = "";
      loadComments(checkinId);
    }

    async function loadComments(checkinId) {
      const div = document.getElementById(`comments-${checkinId}`);
      const { data, error } = await supa.from('comments').select('*').eq('checkin_id', checkinId).order('created_at', { ascending: false });
      if (error) return;
      div.innerHTML = data.map(c => {
        const date = new Date(c.created_at);
        const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const dateString = date.toLocaleDateString();
        return `<div class='comment'>🔈 ${c.content} <span style='color:#888;font-size:11px;'>(${dateString} ${timeString})</span></div>`;
      }).join("");
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('collapsed');
      // Sposta la mappa
      const mapDiv = document.getElementById('map');
      if (sidebar.classList.contains('collapsed')) {
        mapDiv.style.marginLeft = '48px';
      } else {
        mapDiv.style.marginLeft = '260px';
      }
    }

    // Avvia subito la localizzazione per il filtro distanza e centra la mappa SOLO quando la posizione è ottenuta
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => {
          const { latitude, longitude } = pos.coords;
          map.setView([latitude, longitude], 15);
          renderCheckins();
        },
        () => { renderCheckins(); },
        { enableHighAccuracy: true, timeout: 3000, maximumAge: 0 }
      );
    } else {
      renderCheckins();
    }
  </script>
</body>
</html>
