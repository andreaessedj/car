<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarSex Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;600&display=swap');
    body {
      margin: 0;
      font-family: 'Rubik', sans-serif;
      background-color: #f0f2f5;
      color: #333;
    }
    #map {
      height: 60vh;
      width: 100%;
      z-index: 1;
    }
    #filters {
      padding: 12px;
      background: #fff;
      border-bottom: 1px solid #ccc;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    #filters input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
    }
    #controls:hover {
      transform: scale(1.03);
    }
    #controls button {
      padding: 10px 20px;
      font-weight: bold;
      background-color: #ff3366;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    #controls button:hover {
      background-color: #e60050;
    }
    #modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    #modalContent {
      background: #fff;
      padding: 24px;
      border-radius: 10px;
      width: 300px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .closeBtn {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 20px;
      cursor: pointer;
      color: #888;
    }
    .closeBtn:hover {
      color: #000;
    }
    #modalContent input,
    #modalContent textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    #modalContent button {
      background: #28a745;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #checkinList {
      height: 30vh;
      overflow-y: auto;
      padding: 16px;
      background: white;
      border-top: 1px solid #ddd;
    }
    .checkin-item {
      margin-bottom: 10px;
      padding: 10px;
      border-bottom: 1px dashed #ccc;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .checkin-item:hover {
      background: #f9f9f9;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button onclick="geoCheckIn()">📍 Fai Check-in</button>
    <p style="margin-top:10px;font-size:13px;">oppure clicca sulla mappa</p>
  </div>

  <div id="map"></div>

  <div id="filters">
    <input type="text" id="cityFilter" placeholder="Filtra per città" oninput="renderCheckins()">
    <input type="date" id="dateFilter" oninput="renderCheckins()">
  </div>

  <div id="checkinList"></div>

  <div id="modal">
    <div id="modalContent">
      <span class="closeBtn" onclick="hideModal()">✖</span>
      <h3>Nuovo check-in</h3>
      <input type="text" id="nickname" placeholder="Il tuo nome (anonimo)">
      <textarea id="description" placeholder="Scrivi dettagli..." rows="3"></textarea>
      <input type="file" accept="image/*" id="photoInput">
      <button onclick="confirmCheckIn()">Conferma</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    let tempLat = null, tempLon = null;
    let map = L.map('map').setView([41.9, 12.5], 13);
    let markers = {};

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function geoCheckIn() {
      if (!navigator.geolocation) return alert("Geolocalizzazione non supportata.");

      navigator.permissions?.query({name:'geolocation'}).then(result => {
        if (result.state === "denied") {
          return alert("Permessi di localizzazione negati. Abilitali nel browser.");
        }
        navigator.geolocation.getCurrentPosition(
          pos => {
            const { latitude, longitude } = pos.coords;
            map.setView([latitude, longitude], 15);
            showModal(latitude, longitude);
          },
          err => {
            alert("Impossibile ottenere la posizione. Riprova o usa il click manuale sulla mappa.");
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      });
    }

    map.on('click', e => {
      const { lat, lng } = e.latlng;
      showModal(lat, lng);
    });

    function showModal(lat, lon) {
      tempLat = lat;
      tempLon = lon;
      document.getElementById('nickname').value = '';
      document.getElementById('description').value = '';
      document.getElementById('photoInput').value = '';
      document.getElementById('modal').style.display = 'flex';
    }

    function hideModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function confirmCheckIn() {
      const nickname = document.getElementById('nickname').value.trim();
      const description = document.getElementById('description').value.trim();
      const photoInput = document.getElementById('photoInput');

      if (!nickname || !description || tempLat === null || tempLon === null) {
        alert("Compila tutti i campi prima di confermare.");
        return;
      }

      const reader = new FileReader();
      reader.onload = async function () {
        const photoData = reader.result;
        const timestamp = Date.now();
        const city = await getCityFromCoords(tempLat, tempLon);

        const checkin = {
          id: timestamp,
          nickname,
          description,
          lat: tempLat,
          lon: tempLon,
          city,
          photo: photoData,
          time: new Date(timestamp).toLocaleString()
        };

        const all = JSON.parse(localStorage.getItem('checkins') || '[]');
        all.push(checkin);
        localStorage.setItem('checkins', JSON.stringify(all));

        renderCheckins();
        hideModal();
      };

      if (photoInput.files[0]) {
        reader.readAsDataURL(photoInput.files[0]);
      } else {
        reader.onload();
      }
    }

    function getCityFromCoords(lat, lon) {
      const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`;
      return fetch(url)
        .then(res => res.json())
        .then(data => data.address?.city || data.address?.town || data.address?.village || "");
    }

    function addMarker(c) {
      const marker = L.marker([c.lat, c.lon]).addTo(map);
      marker.bindPopup(`
        <strong>${c.nickname}</strong><br>${c.description}<br>
        <em>${c.time} ${c.city ? `- ${c.city}` : ''}</em><br>
        <a href="https://maps.google.com/?q=${c.lat},${c.lon}" target="_blank">📍 Apri in Google Maps</a>
      `);
      markers[c.id] = marker;
    }

    function renderCheckins() {
      const list = document.getElementById('checkinList');
      const cityFilter = document.getElementById('cityFilter')?.value.toLowerCase() || "";
      const dateFilter = document.getElementById('dateFilter')?.value || "";

      list.innerHTML = '';
      Object.values(markers).forEach(m => map.removeLayer(m));
      markers = {};

      const all = (JSON.parse(localStorage.getItem('checkins') || '[]') || [])
        .filter(c => (Date.now() - c.id) <= 12 * 60 * 60 * 1000)
        .filter(c => (c.city || '').toLowerCase().includes(cityFilter))
        .filter(c => {
          if (!dateFilter) return true;
          const d = new Date(c.id);
          return d.toISOString().split("T")[0] === dateFilter;
        })
        .sort((a, b) => b.id - a.id);

      all.forEach(c => {
        addMarker(c);
        const div = document.createElement('div');
        div.className = 'checkin-item';
        div.innerHTML = `<strong>${c.nickname}</strong><br>${c.description}<br><em>${c.time}${c.city ? ' - ' + c.city : ''}</em>`;
        div.onclick = () => {
          map.setView([c.lat, c.lon], 15);
          markers[c.id]?.openPopup();
        };
        list.appendChild(div);
      });
    }

    window.onload = () => {
      renderCheckins();
    }
  </script>
</body>
</html>
