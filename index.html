<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="stylesheet" href="chat.css">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarSex Map</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>
  <script>
    // Richiesta permesso notifiche push all'avvio
    if (window.Notification && Notification.permission !== 'granted') {
      Notification.requestPermission();
    }
  </script>
  <div id="loader" style="position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;z-index:3000;">
    <div style="text-align:center;">
      <div class="spinner" style="margin-bottom:18px;width:48px;height:48px;border:6px solid #eee;border-top:6px solid #ff3366;border-radius:50%;animation:spin 1s linear infinite;"></div>
      <div style="color:#ff3366;font-weight:600;font-size:18px;">Caricamento...</div>
    </div>
  </div>
  <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
    /* Ottimizzazione mobile */
    @media (max-width: 700px) {
      #sidebar {
        height: 54px !important;
        min-height: 0 !important;
        padding: 4px 4px 4px 4px !important;
        gap: 6px !important;
      }
      #sidebar img.logo {
        height: 38px !important;
        width: 38px !important;
        margin-right: 8px !important;
        margin-bottom: 0 !important;
        border-radius: 10px !important;
      }
      #sidebarContent {
        flex-direction: row !important;
        align-items: center !important;
        gap: 6px !important;
        width: 100% !important;
      }
      #sidebarContent > * {
        margin: 0 2px 0 0 !important;
      }
      #sidebar button, #sidebar input, #sidebar label, #sidebar .distance-group {
        width: auto !important;
        min-width: 0 !important;
        max-width: 100vw !important;
        font-size: 13px !important;
      }
      #sidebar input[type="text"] {
        font-size: 13px !important;
        padding: 6px 6px !important;
      }
      #sidebar input[type="range"] {
        width: 80px !important;
      }
      #sidebar .distance-group {
        flex-direction: row !important;
        align-items: center !important;
        gap: 2px !important;
      }
      #sidebar p {
        margin: 0 0 0 0 !important;
        font-size: 11px !important;
      }
      #map {
        top: 54px !important;
        height: 48vh !important;
        min-height: 180px !important;
        max-height: 55vh !important;
      }
      #checkinList {
        padding: 8px 2px 8px 2px !important;
        font-size: 13px !important;
        max-height: 32vh !important;
        min-height: 80px !important;
        overflow-y: auto !important;
      }
      #modalContent {
        width: 95vw !important;
        min-width: 0 !important;
        padding: 10px !important;
      }
    }
  </style>
  <div id="sidebar">
    <img src="logo.png" alt="Logo" class="logo" />
    <div id="sidebarContent">
      <button onclick="geoCheckIn()" style="padding:10px 18px;font-size:16px;font-weight:600;background:linear-gradient(90deg,#ff3366 60%,#ff7a5c 100%);color:#fff;border:none;border-radius:8px;box-shadow:0 2px 8px rgba(255,51,102,0.12);transition:background 0.3s;">📍 Localizzati</button>
      <input type="text" id="cityFilter" placeholder="Cerca per città..." oninput="renderCheckins()" style="padding:10px 12px;border-radius:7px;border:1px solid #e0e0e0;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,0.04);outline:none;transition:border 0.2s;">
      <select id="genderFilter" onchange="renderCheckins()" style="padding:10px 12px;border-radius:7px;border:1px solid #e0e0e0;font-size:15px;">
        <option value="">Genere: tutti</option>
        <option value="M">M</option>
        <option value="F">F</option>
        <option value="Trav">Trav</option>
        <option value="Trans">Trans</option>
      </select>
      <select id="statusFilter" onchange="renderCheckins()" style="padding:10px 12px;border-radius:7px;border:1px solid #e0e0e0;font-size:15px;">
        <option value="">Stato: tutti</option>
        <option value="Coppia">Coppia</option>
        <option value="Single">Single</option>
      </select>
      <div class="distance-group">
        <label for="distanceFilter" style="font-size:14px;color:#ff3366;font-weight:600;">Distanza max (km): <span id="distanceValue">50</span></label>
        <input type="range" id="distanceFilter" min="1" max="100" value="50" oninput="document.getElementById('distanceValue').textContent=this.value; renderCheckins();">
      </div>
      <p>oppure clicca sulla mappa</p>
    </div>
  </div>

  <div id="map"></div>

  <div id="filters">
  </div>

  <div id="checkinList"></div>

  <div id="modal">
    <div id="modalContent">
      <span class="closeBtn" onclick="hideModal()">✖</span>
      <h3 style="color:#ff3366;margin-bottom:18px;">Nuovo check-in</h3>
      <label for="nickname">Nome (anonimo)</label>
      <input type="text" id="nickname" placeholder="Il tuo nome (anonimo)">
      <label for="description">Dettagli</label>
      <textarea id="description" placeholder="Scrivi dettagli..." rows="3"></textarea>
      <div class="flag-group">
        <label>Genere:</label>
        <label><input type="radio" name="gender" value="M"> M</label>
        <label><input type="radio" name="gender" value="F"> F</label>
        <label><input type="radio" name="gender" value="Trav"> Trav</label>
        <label><input type="radio" name="gender" value="Trans"> Trans</label>
      </div>
      <div class="flag-group">
        <label>Stato:</label>
        <label><input type="radio" name="status" value="Coppia"> Coppia</label>
        <label><input type="radio" name="status" value="Single"> Single</label>
      </div>
      <label for="photoInput">Foto (opzionale)</label>
      <input type="file" accept="image/*" id="photoInput">
      <button onclick="confirmCheckIn()">Conferma</button>
    </div>
  </div>

  <script src="main.js"></script>
  <script src="chat.js"></script>
</body>
</html>
